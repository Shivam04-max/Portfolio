<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shivam's Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: rgb(1, 1, 71);
            color: white;
            font-family: Arial, Helvetica, sans-serif;
            overflow-x: hidden;
        }

        .Header {
            width: 100%;
            min-height: 100vh;
            padding: 20px;
        }

        #Header {
            width: 100%;
            min-height: 90vh;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 40px;
        }


        .nav {
            background-color: rgb(0, 0, 116);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 25px;
            padding: 15px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav a {
            margin: 0;
            color: white;
        }

        a:hover {
            color: yellow;
            text-decoration: underline;
        }

        .box-1 {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .socials-container {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 30px;
            margin-left: 20px;
        }

        .socials-container a {
            background-color: white;
            padding: 1em;
            border-radius: 50%;
            height: 64px;
            width: 64px;
            box-sizing: border-box;
            flex-shrink: 0;
            display: grid;
            place-items: center;
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.05);
        }

        .socials-container a svg {
            height: 32px;
        }

        .socials-container a::before {
            content: attr(data-social);
            position: absolute;
            background-color: var(--accent-color);
            color: white;
            text-decoration: none;
            padding: 0.5em 1em;
            border-radius: 100px;
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.05);
            transform: translateY(-30px) rotate(25deg);
            opacity: 0;
            transition: 200ms cubic-bezier(.42, 0, .44, 1.68);
        }

        .socials-container a:hover {
            background-color: var(--accent-color);
            fill: white;
        }

        .socials-container a::after {
            content: '';
            position: absolute;
            height: 0;
            width: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 10px solid var(--accent-color);
            transform: translateY(0) rotate(25deg);
            opacity: 0;
            transition: 200ms cubic-bezier(.42, 0, .44, 1.68);
        }

        .socials-container a:hover::before {
            transform: translateY(-65px) rotate(0);
            opacity: 1;
        }

        .socials-container a:hover::after {
            transform: translateY(-42px) rotate(0);
            opacity: 1;
        }

        .box-2 {
            background: none;
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }


        .logo {
            width: min(450px, 80vw);
            height: min(450px, 80vw);
            object-fit: cover;
            border-radius: 50%;
        }

        .box-2:hover {
            transform: scale(1.1);
            transition: 1s;
            box-shadow: 20px 30px 50px rgba(167, 167, 167, 0.705);
        }

        h1 {
            margin-left: 20px;
            margin-top: 10px;
            font-size: clamp(2rem, 5vw, 5rem);
        }

        p {
            margin-left: 20px;
            font-size: clamp(1rem, 2vw, 1.8rem);
        }

        .H {
            color: rgb(0, 213, 255);
            white-space: nowrap;
            overflow: hidden;
            border-right: 3px solid rgb(0, 213, 255);
            width: 0;


            animation:
                typing 2.5s steps(18, end) forwards,
                blink-cursor 0.75s step-end infinite;
            animation-delay: 0.8s;
        }

        .S {
            white-space: nowrap;
            overflow: hidden;
            border-right: 3px solid #ffffff;
            width: 0;


            animation:
                typing 3.5s steps(18, end) forwards,
                blink-cursor 0.75s step-end infinite;
            animation-delay: 1s;
        }

        @keyframes typing {
            from {
                width: 0;
            }

            to {
                width: 18ch;
            }
        }

        @keyframes blink-cursor {

            from,
            to {
                border-color: transparent;
            }

            50% {
                border-color: #000;
            }
        }

        .Qualification {
            background: white;
            color: black;
            padding: 80px 20px;
        }

        .Quallification h1 {
            font-size: clamp(2rem, 4vw, 4rem);
            padding-top: 20px;
        }

        .Education {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 40px;
        }

        .edu,
        .exp,
        .pro {
            width: 280px;
            height: 280px;
            border-radius: 50%;
        }

        .edu {
            background-image: url(School.png);
            background-size: cover;
            background-position: center;
            border-radius: 50%;
            width: min(300px, 80vw);
            height: min(300px, 80vw);
            transition: 0.4s ease;
        }

        .edu:hover {
            transform: scale(1.1);
            transition: 1s;
            box-shadow: 0px 4px 10px 0px rgba(167, 4, 4, 0.705);
        }

        .exp {
            background-image: url(experience.png);
            background-size: cover;
            background-position: center;
            width: min(300px, 80vw);
            height: min(300px, 80vw);
            transition: 0.4s ease;
            border-radius: 50%;
        }

        .exp:hover {
            transform: scale(1.1);
            transition: 1s;
            box-shadow: 0px 4px 10px 0px rgba(4, 167, 4, 0.705);
        }

        .pro {
            background-image: url(project.png);
            background-size: cover;
            background-position: center;
            border-radius: 50%;
            width: min(300px, 80vw);
            height: min(300px, 80vw);
            transition: 0.4s ease;
        }

        .pro:hover {
            transform: scale(1.1);
            transition: 1s;
            box-shadow: 0px 4px 10px 0px rgba(4, 4, 167, 0.705);
        }

        .Contact {
            min-height: 90vh;
            text-align: center;
            padding-top: 1rem;
        }

        .Contact h1 {
            font-size: clamp(2rem, 4vw, 4rem);
            margin-top: 30px;
        }

        .Contact p {
            margin-top: 10px;
            font-size: clamp(1rem, 2vw, 1.3rem);
        }

        .form {
            display: flex;
            justify-content: center;
            padding: 20px;
            text-align: left;
        }

        form {
            width: 100%;
            max-width: 600px;
        }

        input {
            width: 100%;
            height: 20%;
        }

        label {
            font-size: 1rem;
        }

        button {
            margin-top: 15px;
            width: 150px;
            height: 50px;
            border: none;
            border-radius: 8px;
            background: rgb(0, 213, 255);
            color: rgb(255, 255, 255);
            font-family: Arial, Helvetica, sans-serif;
            font-size: 1rem;
            font-weight: bold;
            margin-bottom: 15px;
            cursor: pointer;
        }

        button:hover {
            background: rgb(255, 255, 255);
            color: rgb(0, 213, 255);
        }

        textarea {
            width: 100%;
            height: 40%;
        }


        .msg-container {
            width: 400px;
            position: absolute;
            background-color: rgb(0, 166, 255);
            text-align: center;
            border-radius: 6px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1.1);
            padding: 0 30px 30px;
            transition: transform 0.4s, top 0.4s;

        }

        .check {
            height: 90px;
            width: 90px;
            border-radius: 50%;
            margin-top: -50px;
            box-shadow: 0 2px 5px rgba(1, 1, 1, 0.2);
        }

        .Tnk {
            margin: 30px 0 10px;
            font-weight: 500;
            font-size: 38px;
        }

        .res {
            font-size: 1.5rem;
            font-family: 'Times New Roman', Times, serif;
            font-weight: lighter;
        }

        .msg-container button {
            width: 100%;
            font-size: 1.5rem;
            background-color: rgb(21, 252, 0);
            color: #000;
            margin-top: 20px;
            border: 0;
            outline: none;
            box-shadow: 0 5px 5px rgba(1, 1, 1, 0.2);
        }

        .msg-container button:hover {
            background-color: blue;
            color: white;
        }

        footer {
            background-color: rgba(0, 0, 97, 0.621);
            color: rgb(105, 85, 204);
            text-align: center;
            padding: 15px;
            margin-top: 10px;
        }

        footer p {
            font-size: 0.9rem;
        }

        .Social-media {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.25rem;
        }

        .social {
            height: 50px;
            width: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .social:hover {
            background-color: #081b31;
        }

        #insta {
            height: 50px;
            width: 50px;
            object-fit: cover;
            border-radius: 50%;
        }

        #insta:hover {
            background-color: #f4f4f6;
        }

        /* Tablet */

        @media (max-width:992px) {

            #Header {
                flex-direction: column-reverse;
                text-align: center;
                justify-content: center;
            }

            .box-1 {
                align-items: center;
            }

            h1,
            p {
                margin-left: 0;
            }

            .socials-container {
                justify-content: center;
                margin-left: 0;
            }

            .logo {
                width: 350px;
                height: 350px;
            }
        }

        /* Mobile */

        @media (max-width:768px) {

            .logo {
                width: 280px;
                height: 280px;
            }

            .edu,
            .exp,
            .pro {
                width: 220px;
                height: 220px;
            }

            button {
                width: 100%;
            }

            .nav {
                gap: 12px;
            }

            .socials-container a {
                width: 55px;
                height: 55px;
            }

            .socials-container a svg {
                width: 26px;
                height: 26px;
            }
        }

        /* Small Phones */

        @media (max-width:480px) {

            .logo {
                width: 220px;
                height: 220px;
            }

            .edu,
            .exp,
            .pro {
                width: 180px;
                height: 180px;
            }

            h1 {
                font-size: 2rem;
            }

            p {
                font-size: 1rem;
            }

            .nav a {
                font-size: 14px;
            }
        }
    </style>
